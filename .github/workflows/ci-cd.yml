name: CI/CD Pipeline

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout do repositório
        uses: actions/checkout@v4

      - name: Configurar Java 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Compilar o projeto
        run: javac *.java

  deploy:
    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: Checkout do repositório
        uses: actions/checkout@v4

      - name: Build da imagem Docker
        run: docker build -t bibliotheca-arcana .

      - name: Testar o container
        run: docker run --rm bibliotheca-arcana

  notify-discord:
    runs-on: ubuntu-latest
    needs: [build, deploy]
    if: always()

    steps:
      - name: Enviar alerta no Discord
        env:
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
        run: |
          if [ "${{ needs.build.result }}" == "success" ] && [ "${{ needs.deploy.result }}" == "success" ]; then
            STATUS="📖 SUCESSO! Feitiço enviado com cuidado aos elfos para guardarmos no grimório!"
            COLOR=3066993
          else
            STATUS="💀 FALHA! O feitiço não foi enviado para os elfos guardarem no grimório!"
            COLOR=15158332
          fi

          if [ "${{ github.event_name }}" == "push" ]; then
            EVENT="Push no main"
          else
            EVENT="Pull Request"
          fi

          curl -H "Content-Type: application/json" \
               -X POST \
               -d "{
                 \"embeds\": [{
                   \"title\": \"🔮 Bibliotheca Arcana — Câmara dos Segredos\",
                   \"description\": \"🦉 O bibliotecário está relatando algo...\n\n$STATUS\",
                   \"color\": $COLOR,
                   \"fields\": [
                     { \"name\": \"⚗️ Resultado do lançamento do feitiço (build)\", \"value\": \"${{ needs.build.result }}\", \"inline\": true },
                     { \"name\": \"🐉 A invocação (deploy) foi\", \"value\": \"${{ needs.deploy.result }}\", \"inline\": true },
                     { \"name\": \"📜 O Pergaminho anotou o principal afetado\", \"value\": \"$EVENT\", \"inline\": false },
                     { \"name\": \"✍️ Escribão responsável pelo feitiço foi\", \"value\": \"${{ github.actor }}\", \"inline\": true },
                     { \"name\": \"🪶 A crônica de onde veio o feitiço está na página (commit)\", \"value\": \"${{ github.event.head_commit.message }}\", \"inline\": false },
                     { \"name\": \"🔗 Para ver o tomo do problema, entre no portal\", \"value\": \"[Abrir portal](${GITHUB_SERVER_URL}/${{ github.repository }}/actions/runs/${{ github.run_id }})\", \"inline\": false }
                   ]
                 }]
               }" \
               "$DISCORD_WEBHOOK_URL"