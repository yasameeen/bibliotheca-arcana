name: CI/CD Pipeline

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout do repositório
        uses: actions/checkout@v4

      - name: Configurar Java 17
        uses: actions/setup-java@v4
        with:
          distribution: 'eclipse-temurin'
          java-version: '17'

      - name: Compilar o projeto
        run: javac *.java

  deploy:
    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: Checkout do repositório
        uses: actions/checkout@v4

      - name: Build da imagem Docker
        run: docker build -t bibliotheca-arcana .

      - name: Testar o container
        run: docker run --rm bibliotheca-arcana

  notify-discord:
    runs-on: ubuntu-latest
    needs: [build, deploy]
    if: always()

    steps:
      - name: Enviar alerta no Discord
        env:
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
        run: |
          if [ "${{ needs.build.result }}" == "success" ] && [ "${{ needs.deploy.result }}" == "success" ]; then
            STATUS="✅ Sucesso"
            COLOR=3066993
            EMOJI="🔮"
          else
            STATUS="❌ Falha"
            COLOR=15158332
            EMOJI="💀"
          fi

          if [ "${{ github.event_name }}" == "push" ]; then
            EVENT="Push no main"
          else
            EVENT="Pull Request"
          fi
          
          curl -H "Content-Type: application/json" \
               -X POST \
               -d "{
                 \"embeds\": [{
                   \"title\": \"$EMOJI Bibliotheca Arcana — CI/CD\",
                   \"description\": \"**$STATUS** no pipeline!\",
                   \"color\": $COLOR,
                   \"fields\": [
                     { \"name\": \"📌 Evento\", \"value\": \"$EVENT\", \"inline\": true },
                     { \"name\": \"👤 Autor\", \"value\": \"${{ github.actor }}\", \"inline\": true },
                     { \"name\": \"🔨 Build\", \"value\": \"${{ needs.build.result }}\", \"inline\": true },
                     { \"name\": \"🐳 Deploy\", \"value\": \"${{ needs.deploy.result }}\", \"inline\": true },
                     { \"name\": \"📝 Commit\", \"value\": \"${{ github.event.head_commit.message }}\", \"inline\": false },
                     { \"name\": \"🔗 Link\", \"value\": \"[Ver no GitHub](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }})\", \"inline\": false }
                   ]
                 }]
               }" \
               "$DISCORD_WEBHOOK_URL"
