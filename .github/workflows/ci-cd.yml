name: CI/CD Pipeline

on:
  push:
    branches: [ "feature/biblioteca-virtual", "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:
    name: Build e Teste
    runs-on: ubuntu-latest

    steps:
      - name: Checkout do código
        uses: actions/checkout@v4

      - name: Configurar Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Compilar o projeto
        run: javac *.java

      - name: Verificar compilação
        run: echo "✦ Compilação concluída com sucesso!"

  deploy:
    name: Build da imagem Docker
    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: Checkout do código
        uses: actions/checkout@v4

      - name: Build da imagem Docker
        run: docker build -t bibliotheca-arcana .

      - name: Verificar container
        run: docker run --rm bibliotheca-arcana echo "Container funcionando!"
